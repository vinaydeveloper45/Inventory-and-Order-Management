databases:
  - name: inventory-postgres
    plan: free
    databaseName: inventory_db
    user: inventory_user

services:
  - type: web
    name: inventory-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: BACKEND_PORT
        value: 8000
